    <form (ngSubmit)="onSubmit()" class="flex justify-center items-center min-h-screen py-2">
        <section class="space-y-5 w-full max-w-xl p-20 bg-white/6 backdrop-blur-md border border-white/10 rounded-2xl shadow-2xl">
            <h1 class="font-bold text-2xl flex justify-center">Login</h1>
            <div class="flex flex-col gap-2">
                <span>Email</span>
                <p-input-group>
                    <p-inputgroup-addon>
                        <svg data-p-icon="user" />
                    </p-inputgroup-addon>
                    <input pInputText name="email" [(ngModel)]="user.email"/>
                </p-input-group>
            </div>
            <div class="flex flex-col gap-2">
                <span>Password</span>
                <p-icon-field>
                    <p-inputicon>
                        <svg data-p-icon="lock"></svg>
                    </p-inputicon>
                    <input pInputPassword name="password" [(ngModel)]="user.password" [(mask)]="mask" [fluid]="true" />
                    <p-inputicon (click)="mask = !mask"  style="cursor: pointer;">
                        @if (mask) {
                            <svg data-p-icon="eye" width="16" height="16"></svg>
                        } @else {
                            <svg data-p-icon="eye-slash" width="16" height="16"></svg>
                        }
                    </p-inputicon>
                </p-icon-field>
            </div>
            <div>
                <button pbutton type="submit" class="bg-indigo-900 rounded-full px-6 py-2 font-semibold w-full cursor-pointer mt-6 mb-2">Login</button>
            </div>
            <span>Don't have an account ? <a href="signup" class="bg-indigo-900">Register</a></span>
        </section>
    </form>
